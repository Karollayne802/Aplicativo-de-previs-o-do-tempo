<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Previsão do tempo</title>
</head>

<body>
    <div class="container">
        <select id="cidade">
            <option value="">Selecione uma cidade</option>
            <option value="new york">Nova Iorque</option>
            <option value="los angeles">Los Angeles</option>
            <option value="chicago">Chicago</option>
            <option value="paris">Paris</option>
            <option value="tokyo">Tóquio</option>
            <option value="london">Londres</option>
        </select>

        <button id="get-weather-btn">Buscar</button>

        <!-- Local onde será exibido o nome da cidade -->
        <h2 id="location"></h2>

        <!-- Local onde será exibido o ícone do clima vindo da API -->
        <img id="weather-icon">

        <!-- Local onde será exibido o tipo de clima -->
        <p id="weather-main"></p>

        <!-- Local onde será exibida a temperatura -->
        <p id="main-temperature"></p>

        <!-- Local onde será exibida a sensação térmica-->
        <p id="feels-like"></p>

        <!-- Local onde será exibida a umidade do ar  -->
        <p id="humidity"></p>

        <!-- Local onde será exibida a velocidade do vento  -->
        <p id="wind"></p>

        <!-- Local onde será exibida a rajada de vento  -->
        <p id="wind-gust"></p>
    </div>


    <script src="script.js"></script>


</body>

</html>
